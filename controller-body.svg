<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" width="100%" height="100%" aria-label="Dark controller body concept">
  <defs>
    <linearGradient id="shellFill" x1="500" y1="210" x2="500" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3a5787"/>
      <stop offset="0.42" stop-color="#274266"/>
      <stop offset="1" stop-color="#16263d"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="500" y1="246" x2="500" y2="764" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#243654"/>
      <stop offset="0.48" stop-color="#1a2943"/>
      <stop offset="1" stop-color="#101a2c"/>
    </linearGradient>
    <linearGradient id="triggerFill" x1="0" y1="72" x2="0" y2="182" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#364f78"/>
      <stop offset="1" stop-color="#243552"/>
    </linearGradient>
    <radialGradient id="stickCapFill" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 -18) rotate(90) scale(76)">
      <stop offset="0" stop-color="#edf4ff"/>
      <stop offset="0.56" stop-color="#b7d5ff"/>
      <stop offset="1" stop-color="#7eaef6"/>
    </radialGradient>
    <filter id="shellShadow" x="-12%" y="-10%" width="124%" height="130%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
    <filter id="cyanGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#45d8ff" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#5fa8ff" flood-opacity="0.12"/>
    </filter>
    <style>
      .shell {
        fill: url(#shellFill);
        stroke: rgba(139, 177, 228, 0.34);
        stroke-width: 5;
        stroke-linejoin: round;
      }
      .panel {
        fill: url(#panelFill);
        stroke: rgba(139, 177, 228, 0.18);
        stroke-width: 4;
        stroke-linejoin: round;
      }
      .trim {
        stroke: rgba(126, 166, 220, 0.18);
        stroke-width: 5;
        fill: none;
        stroke-linecap: round;
      }
      .control {
        fill: rgba(255, 255, 255, 0.11);
        stroke: rgba(255, 255, 255, 0.18);
        stroke-width: 3;
      }
      .stick-ring {
        fill: rgba(10, 18, 32, 0.42);
        stroke: rgba(126, 166, 220, 0.22);
        stroke-width: 4;
      }
      .stick-inner {
        fill: rgba(255, 255, 255, 0.07);
        stroke: rgba(255, 255, 255, 0.11);
        stroke-width: 3;
      }
      .stick-cap {
        fill: url(#stickCapFill);
        stroke: rgba(246, 250, 255, 0.78);
        stroke-width: 3;
      }
      .soft-icon {
        fill: none;
        stroke: rgba(234, 242, 255, 0.72);
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .label {
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .label-light {
        fill: rgba(236, 243, 255, 0.92);
        font-size: 22px;
      }
      .label-face {
        fill: rgba(10, 16, 26, 0.92);
        font-size: 26px;
      }
    </style>
  </defs>

  <g id="shoulders" filter="url(#cyanGlow)">
    <path d="M 315,130 C 315,70 365,70 365,130 Z" fill="url(#triggerFill)" stroke="rgba(139, 177, 228, 0.26)" stroke-width="4"/>
    <rect x="300" y="150" width="80" height="40" rx="12" class="control"/>
    <text x="340" y="172" class="label label-light">LB</text>

    <path d="M 635,130 C 635,70 685,70 685,130 Z" fill="url(#triggerFill)" stroke="rgba(139, 177, 228, 0.26)" stroke-width="4"/>
    <rect x="620" y="150" width="80" height="40" rx="12" class="control"/>
    <text x="660" y="172" class="label label-light">RB</text>
  </g>

  <g id="controller-body" filter="url(#shellShadow)">
    <path
      d="M 340,210
         L 660,210
         C 760,210 880,280 920,410
         C 970,570 950,770 870,840
         C 810,890 730,810 660,700
         C 580,675 420,675 340,700
         C 270,810 190,890 130,840
         C 50,770 30,570 80,410
         C 120,280 240,210 340,210 Z"
      class="shell"/>

    <path
      d="M 350,245
         L 650,245
         C 730,245 829,300 861,409
         C 901,540 887,714 825,771
         C 779,813 719,752 665,663
         C 594,642 406,642 335,663
         C 281,752 221,813 175,771
         C 113,714 99,540 139,409
         C 171,300 270,245 350,245 Z"
      class="panel"/>

    <path d="M 98,475 C 160,530 260,650 345,695" class="trim"/>
    <path d="M 902,475 C 840,530 740,650 655,695" class="trim"/>
    <path d="M 500,210 L 500,228" class="trim"/>
    <path d="M 500,662 L 500,680" class="trim"/>
  </g>

  <g id="center-buttons" filter="url(#cyanGlow)">
    <circle cx="500" cy="290" r="32" class="control"/>
    <path d="M 488,296 L 488,286 L 500,276 L 512,286 L 512,296 Z" class="soft-icon"/>
    <path d="M 494,296 L 494,290 L 506,290 L 506,296" class="soft-icon"/>

    <rect x="408" y="365" width="34" height="26" rx="6" class="control"/>
    <rect x="415" y="372" width="20" height="12" rx="2" fill="none" stroke="rgba(236, 243, 255, 0.72)" stroke-width="3"/>

    <rect x="485" y="368" width="30" height="22" rx="4" class="control"/>
    <path d="M 500,383 L 500,373 M 494,379 L 500,373 L 506,379" class="soft-icon"/>

    <rect x="558" y="365" width="34" height="26" rx="6" class="control"/>
    <line x1="566" y1="373" x2="584" y2="373" class="soft-icon"/>
    <line x1="566" y1="378" x2="584" y2="378" class="soft-icon"/>
    <line x1="566" y1="383" x2="584" y2="383" class="soft-icon"/>
  </g>

  <g id="left-stick" filter="url(#cyanGlow)">
    <circle cx="280" cy="385" r="85" class="stick-ring"/>
    <circle cx="280" cy="385" r="72" class="stick-inner"/>
    <circle cx="280" cy="385" r="54" class="stick-cap"/>
  </g>

  <g id="d-pad" filter="url(#cyanGlow)">
    <circle cx="390" cy="550" r="80" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>
    <path d="M 390,485 L 390,615 M 325,550 L 455,550" stroke="rgba(255,255,255,0.18)" stroke-width="46" stroke-linecap="square"/>
    <path d="M 390,488 L 390,612 M 328,550 L 452,550" stroke="rgba(255,255,255,0.10)" stroke-width="40" stroke-linecap="square"/>
    <path d="M 390,510 L 390,590 M 350,550 L 430,550" stroke="rgba(255,255,255,0.18)" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g id="right-stick" filter="url(#cyanGlow)">
    <circle cx="630" cy="550" r="85" class="stick-ring"/>
    <circle cx="630" cy="550" r="72" class="stick-inner"/>
    <circle cx="630" cy="550" r="54" class="stick-cap"/>
  </g>

  <g id="abxy-group" filter="url(#cyanGlow)">
    <circle cx="720" cy="385" r="85" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>

    <circle cx="720" cy="330" r="24" fill="#f4cf69" stroke="rgba(255,255,255,0.30)" stroke-width="3"/>
    <text x="720" y="332" class="label label-face">Y</text>

    <circle cx="665" cy="385" r="24" fill="#66aaff" stroke="rgba(255,255,255,0.30)" stroke-width="3"/>
    <text x="665" y="387" class="label label-face">X</text>

    <circle cx="775" cy="385" r="24" fill="#ff975e" stroke="rgba(255,255,255,0.30)" stroke-width="3"/>
    <text x="775" y="387" class="label label-face">B</text>

    <circle cx="720" cy="440" r="24" fill="#55e1b2" stroke="rgba(255,255,255,0.30)" stroke-width="3"/>
    <text x="720" y="442" class="label label-face">A</text>
  </g>
</svg>
