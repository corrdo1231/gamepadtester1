<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gamepad Tester - GamePadTester.tools</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 26px;
      color: #222;
    }
    .main {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .left {
      flex: 2;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .card {
      background: white;
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .card h2 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #333;
    }
    .controller {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      position: relative;
    }
    .controller svg {
      width: 100%;
    }
    .status {
      text-align: center;
      margin: 15px 0;
      font-size: 16px;
      font-weight: bold;
    }
    .stick {
      position: absolute;
      width: 35px;
      height: 35px;
      background: #007bff;
      border-radius: 50%;
      transition: 0.05s;
    }
    .btn {
      padding: 10px 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-group {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    .sticks {
      display: flex;
      gap: 20px;
      justify-content: center;
    }
    .stick-box {
      width: 120px;
      height: 120px;
      border: 2px solid #ddd;
      border-radius: 50%;
      position: relative;
    }
    .stick-dot {
      width: 20px;
      height: 20px;
      background: #28a745;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .value {
      text-align: center;
      margin-top: 8px;
      font-size: 14px;
    }
    .triggers {
      display: flex;
      gap: 20px;
      justify-content: center;
    }
    .trigger {
      width: 60px;
      height: 120px;
      background: #eee;
      border-radius: 6px;
      position: relative;
    }
    .trigger-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: #007bff;
      border-radius: 6px;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-top: 15px;
    }
    .key {
      padding: 10px;
      background: #eee;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      transition: 0.1s;
    }
    .key.active {
      background: #007bff;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Gamepad Tester - GamePadTester.tools</h1>
    </div>

    <div class="main">
      <div class="left">
        <div class="controller">
          <svg viewBox="0 0 500 300" fill="none">
            <path d="M70 150C70 100 100 70 150 60H350C400 70 430 100 430 150C430 200 410 250 380 280H120C90 250 70 200 70 150Z" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
            <circle cx="120" cy="180" r="30" stroke="#ccc" fill="white"/>
            <circle cx="330" cy="220" r="30" stroke="#ccc" fill="white"/>
            <circle cx="170" cy="230" r="25" stroke="#ccc" fill="white"/>
            <path d="M170 210V250M150 230H190" stroke="#666" stroke-width="2"/>
            <circle cx="370" cy="160" r="20" stroke="#ccc" fill="white"/>
            <circle cx="370" cy="200" r="20" stroke="#ccc" fill="white"/>
            <circle cx="395" cy="180" r="20" stroke="#ccc" fill="white"/>
            <circle cx="345" cy="180" r="20" stroke="#ccc" fill="white"/>
            <text x="370" y="165" text-anchor="middle">Y</text>
            <text x="370" y="205" text-anchor="middle">A</text>
            <text x="395" y="185" text-anchor="middle">B</text>
            <text x="345" y="185" text-anchor="middle">X</text>
          </svg>
          <div id="lStick" class="stick" style="top:160px; left:102px;"></div>
          <div id="rStick" class="stick" style="top:202px; left:312px;"></div>
        </div>

        <div class="status" id="status">No controller connected</div>

        <div class="btn-group">
          <button class="btn" onclick="connect()">Refresh</button>
          <button class="btn" onclick="vibrate()">Vibrate</button>
        </div>

        <div class="card" style="margin-top:20px;">
          <h2>Buttons</h2>
          <div class="buttons" id="buttons"></div>
        </div>
      </div>

      <div class="right">
        <div class="card">
          <h2>Analog Sticks</h2>
          <div class="sticks">
            <div>
              <div class="stick-box">
                <div id="lDot" class="stick-dot"></div>
              </div>
              <div class="value" id="lVal">X:0.00 Y:0.00</div>
            </div>
            <div>
              <div class="stick-box">
                <div id="rDot" class="stick-dot"></div>
              </div>
              <div class="value" id="rVal">X:0.00 Y:0.00</div>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>Triggers</h2>
          <div class="triggers">
            <div>
              <div class="trigger"><div id="lt" class="trigger-fill" style="height:0%"></div></div>
              <div class="value">LT</div>
            </div>
            <div>
              <div class="trigger"><div id="rt" class="trigger-fill" style="height:0%"></div></div>
              <div class="value">RT</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const names = ['A','B','X','Y','LB','RB','LT','RT','View','Menu','LS','RS','↑','↓','←','→'];
    const btnContainer = document.getElementById('buttons');
    names.forEach((n,i) => {
      const d = document.createElement('div');
      d.className = 'key';
      d.id = `k${i}`;
      d.innerText = n;
      btnContainer.appendChild(d);
    });

    function connect() {
      navigator.getGamepads();
    }

    function vibrate() {
      const pads = navigator.getGamepads();
      for(let p of pads) if(p?.vibrationActuator) {
        p.vibrationActuator.playEffect('dual-rumble', {duration:500, strongMagnitude:0.8, weakMagnitude:0.8});
      }
    }

    function loop() {
      const pads = navigator.getGamepads();
      let ok = false;
      for(let pad of pads) {
        if(!pad) continue;
        ok = true;
        document.getElementById('status').innerText = 'Connected: '+pad.id;

        pad.buttons.forEach((b,i) => {
          const el = document.getElementById(`k${i}`);
          if(el) el.classList.toggle('active', b.pressed);
        });

        const ax = pad.axes;
        const lx = ax[0]||0, ly=ax[1]||0;
        const rx=ax[2]||0, ry=ax[3]||0;

        document.getElementById('lVal').innerText = `X:${lx.toFixed(2)} Y:${ly.toFixed(2)}`;
        document.getElementById('rVal').innerText = `X:${rx.toFixed(2)} Y:${ry.toFixed(2)}`;

        const ls = document.getElementById('lDot');
        const rs = document.getElementById('rDot');
        ls.style.transform = `translate(calc(${50+lx*40}% - 50%), calc(${50+ly*40}% - 50%))`;
        rs.style.transform = `translate(calc(${50+rx*40}% - 50%), calc(${50+ry*40}% - 50%))`;

        const lsv = document.getElementById('lStick');
        const rsv = document.getElementById('rStick');
        lsv.style.transform = `translate(${lx*20}px, ${ly*20}px)`;
        rsv.style.transform = `translate(${rx*20}px, ${ry*20}px)`;

        const lt = pad.buttons[6]?.value||0;
        const rt = pad.buttons[7]?.value||0;
        document.getElementById('lt').style.height = lt*100+'%';
        document.getElementById('rt').style.height = rt*100+'%';
      }
      if(!ok) document.getElementById('status').innerText = 'No controller connected';
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
